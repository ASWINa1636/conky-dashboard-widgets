conky.config = {
    alignment = 'top_right',
    gap_x = 20,
    gap_y = 40,

    background = true,
    double_buffer = true,
    update_interval = 1,

    use_xft = true,
    font = 'JetBrains Mono:size=12',

    own_window = true,
    own_window_type = 'desktop',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,

    minimum_width = 380,
    maximum_width = 380,
    gap_x = 30,
};

conky.text = [[
${font JetBrains Mono:bold:size=12}SYSTEM LOAD${font}

${font JetBrains Mono:bold:size=12}CPU${font}
${top name 1} ${alignr}${top cpu 1}%
${top name 2} ${alignr}${top cpu 2}%
${top name 3} ${alignr}${top cpu 3}%
${top name 4} ${alignr}${top cpu 4}%
${top name 5} ${alignr}${top cpu 5}%

${font JetBrains Mono:bold:size=12}MEMORY${font}
${top_mem name 1} ${alignr}${top_mem mem 1}%
${top_mem name 2} ${alignr}${top_mem mem 2}%
${top_mem name 3} ${alignr}${top_mem mem 3}%
${top_mem name 4} ${alignr}${top_mem mem 4}%
${top_mem name 5} ${alignr}${top_mem mem 5}%

${font JetBrains Mono:bold:size=12}DISK IO${font}
Read   ${alignr}${diskio_read}
Write  ${alignr}${diskio_write}

${font JetBrains Mono:bold:size=12}NETWORK TRAFFIC${font}
${downspeedgraph wlp2s0 40,300 00FFFF FF00FF}
${upspeedgraph wlp2s0 40,300 00FFFF FF00FF}

${font JetBrains Mono:bold:size=12}POWER${font}
Battery: ${execi 10 cat /sys/class/power_supply/BAT0/capacity}%
Status: ${execi 10 cat /sys/class/power_supply/BAT0/status}
]];
